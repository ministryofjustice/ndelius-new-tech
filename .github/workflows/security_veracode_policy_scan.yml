name: Security Veracode policy scan
on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"
jobs:
  assembly:
    name: Assemble jar
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'sbt'
          cache-dependency-path: build.sbt

      - name: Setup sbt
        uses: sbt/setup-sbt@508b753e53cb6095967669e0911487d2b9bc9f41 # v1.1.22

      - name: Compile Scala code
        env:
          _JAVA_OPTIONS: "-Xms512m -Xmx1224m"
        run: |
          export SBT_OPTS="-Dsbt.jse.engineType=Node -Dsbt.jse.command=$(which node)"
          sbt compile < /dev/null

      - name: Run sbt assembly
        env:
          _JAVA_OPTIONS: "-Xms512m -Xmx1224m"
          APP_VERSION: ${{ github.run_number }}
        run: |
          export SBT_OPTS="-Dsbt.jse.engineType=Node -Dsbt.jse.command=$(which node)"
          sbt 'set test in assembly := {}' assembly < /dev/null

      - name: Save Fat Jar
        run: |
          mkdir -p target/artifacts
          rm target/scala-2.13/ndelius2_*-web-assets.jar
          cp target/scala-2.13/*.jar target/artifacts/
          cp target/artifacts/ndelius2*.jar target/artifacts/ndelius2.jar

      - name: Package
        run: |
          cd target/artifacts
          zip source.zip ndelius2.jar

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: build-results
          path: target/artifacts/source.zip

  security-veracode-policy-check:
    name: Security Veracode policy scan
    needs: [assembly]
    uses: ministryofjustice/hmpps-github-actions/.github/workflows/security_veracode_policy_scan.yml@b74c1336dede62686c46e93458e2ef197ca579ca # v2.13.0
    with:
      channel_id: ${{ vars.SECURITY_ALERTS_SLACK_CHANNEL_ID || 'NO_SLACK' }}
      veracode_package_artifact_name: build-results
    secrets:
      HMPPS_SRE_SLACK_BOT_TOKEN: ${{ secrets.HMPPS_SRE_SLACK_BOT_TOKEN }}
      HMPPS_VERACODE_API_ID_0: ${{ secrets.HMPPS_VERACODE_API_ID_0 }}
      HMPPS_VERACODE_API_ID_1: ${{ secrets.HMPPS_VERACODE_API_ID_1 }}
      HMPPS_VERACODE_API_ID_2: ${{ secrets.HMPPS_VERACODE_API_ID_2 }}
      HMPPS_VERACODE_API_ID_3: ${{ secrets.HMPPS_VERACODE_API_ID_3 }}
      HMPPS_VERACODE_API_ID_4: ${{ secrets.HMPPS_VERACODE_API_ID_4 }}
      HMPPS_VERACODE_API_KEY_0: ${{ secrets.HMPPS_VERACODE_API_KEY_0 }}
      HMPPS_VERACODE_API_KEY_1: ${{ secrets.HMPPS_VERACODE_API_KEY_1 }}
      HMPPS_VERACODE_API_KEY_2: ${{ secrets.HMPPS_VERACODE_API_KEY_2 }}
      HMPPS_VERACODE_API_KEY_3: ${{ secrets.HMPPS_VERACODE_API_KEY_3 }}
      HMPPS_VERACODE_API_KEY_4: ${{ secrets.HMPPS_VERACODE_API_KEY_4 }}